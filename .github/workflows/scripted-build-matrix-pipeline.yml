on:
  workflow_call:
    inputs:
      netSdkVersion:
        description: The primary .NET SDK version required for the build process, as per the syntax required by the 'setup-dotnet' action.
        required: true
        type: string
        default: '8.0.x'
      additionalNetSdkVersion:
        description: An additional .NET SDK version required for the build process, as per the syntax required by the 'setup-dotnet' action.
        required: false
        type: string
      pythonVersion:
        description: Specify an additional Python version required for the build process
        required: false
        type: string
      additionalCachePaths:
        description: Custom paths that need to be included in the multi-stage pipeline caching.
        required: false
        default: ''
        type: string
      configuration:
        description: The target build configuration.  
        required: false
        default: 'Release'
        type: string
      compilePhaseEnv:
        description: A JSON object representing the environment variables required when running the 'compile' stage of this workflow.
        required: false
        type: string
      compilePhaseTasks:
        description: The tasks that need to be run as part of the 'compile' stage, formatted as a comma-delimited string (e.g. 'Build' or 'Build,Analysis').
        required: false
        default: 'Build,Analysis'
        type: string
      testPhaseEnv:
        description: A JSON object representing the environment variables required when running the 'test' stage of this workflow.
        required: false
        type: string
      testPhaseTasks:
        description: The tasks that need to be run as part of the 'test' stage, formatted as a comma-delimited string (e.g. 'Test' or 'Test,TestReport').
        required: false
        default: 'Test'
        type: string
      testArtifactName:
        description: If set, during the test phase, uploads a GitHub artifact with the provided name (path must be specified in `artifactPath`)
        required: false
        type: string  
      testArtifactPath:
        description: If set, during the test phase, uploads a GitHub artifact with the provided path (name must be specified in `artifactName`). The path can be a file, directory or wildcard pattern; multiple paths can be specified using newline demiliter.
        required: false
        type: string  
      packagePhaseEnv:
        description: A JSON object representing the environment variables required when running the 'package' stage of this workflow.
        required: false
        type: string
      packagePhaseTasks:
        description: The tasks that need to be run as part of the 'package' stage, formatted as a comma-delimited string.
        required: false
        default: 'Package'
        type: string
      publishPhaseEnv:
        description: A JSON object representing the environment variables required when running the 'publish' stage of this workflow.
        required: false
        type: string
      publishPhaseTasks:
        description: The tasks that need to be run as part of the 'publish' stage, formatted as a comma-delimited string.
        required: false
        default: 'Publish'
        type: string
      publishArtifactName:
        description: If set, during the publish phase, uploads a GitHub artifact with the provided name (path must be specified in `artifactPath`)
        required: false
        type: string  
      publishArtifactPath:
        description: If set, during the publish phase, uploads a GitHub artifact with the provided path (name must be specified in `artifactName`). The path can be a file, directory or wildcard pattern; multiple paths can be specified using newline demiliter.
        required: false
        type: string    
      forcePublish:
        description: When true, the Publish stage will be run regardless of the current branch or tag.
        required: false
        default: false
        type: boolean
      skipCleanup:
        description: When true the pipeline clean-up stage will not be run. For example, the cache used between pipeline stages will be retained.
        required: false
        default: false
        type: boolean
      buildScriptPath:
        description: The path to the build script to run.
        required: false
        default: ./build.ps1
        type: string
      enableCrossOsCaching:
        description: "When true the enables the 'enableCrossOsArchive' property on the GitHub Actions cache task. ref: https://github.com/actions/cache/blob/main/tips-and-workarounds.md#cross-os-cache"
        required: false
        default: true
        type: boolean
      compilePhaseRunnerOs:
        description: The operating system to run the 'compile' stage of this workflow on.
        required: false
        default: windows-latest
        type: string
      testPhaseMatrixJson:
        description: The OS and .NET Framework matrix configuration to be used for running the 'test' stage of this workflow.
        required: false
        default: |
          {
            "os": ["ubuntu-latest", "windows-latest"],
            "dotnetFramework": ["net8.0", "net481"],
            "exclude": [
              {
                "os": "ubuntu-latest",
                "dotnetFramework": "net481"
              }
            ]
          }
        type: string
      packagePhaseRunnerOs:
        description: The operating system to run the 'package' stage of this workflow on.
        required: false
        default: windows-latest
        type: string
      postCompileRunnerOs:
        description: The operating system to run the optional 'post-compile' job on.
        required: false
        default: ubuntu-latest
        type: string
      postCompilePhaseEnv:
        description: A JSON object representing the environment variables required when running the optional 'post-compile' job.
        required: false
        type: string
      postCompilePhaseTasks:
        description: The tasks that need to be run as part of the 'post-compile' stage, formatted as a comma-delimited string.
        required: false
        default: 'postCompile'
        type: string
      postCompileArtifactName:
        description: If set, during the post-compile phase, uploads a GitHub artifact with the provided name (path must be specified in `postCompileArtifactPath`).
        required: false
        default: ''
        type: string
      postCompileArtifactPath:
        description: If set, during the post-compile phase, uploads a GitHub artifact with the provided path (name must be specified in `postCompileArtifactName`). The path can be a file, directory or wildcard pattern; multiple paths can be specified using newline delimiter.
        required: false
        default: ''
        type: string

    secrets:
      compilePhaseAzureCredentials:
        required: false
      compilePhaseSecrets:
        description: A YAML string representing a dictionary of secrets required when running the 'compile' stage of this workflow.
        required: false
      testPhaseAzureCredentials:
        required: false
      testPhaseSecrets:
        description: A YAML string representing a dictionary of secrets required when running the 'test' stage of this workflow.
        required: false
      packagePhaseAzureCredentials:
        required: false
      packagePhaseSecrets:
        description: A YAML string representing a dictionary of secrets required when running the 'package' stage of this workflow.
        required: false
      publishPhaseAzureCredentials:
        required: false
      publishPhaseSecrets:
        description: A YAML string representing a dictionary of secrets required when running the 'publish' stage of this workflow.
        required: false
      postCompilePhaseSecrets:
        description: A YAML string representing a dictionary of secrets required when running the optional 'post-compile' job.
        required: false
      secretsEncryptionKey:
        description: A string representing the shared secret used to encrypt the secrets YAML object.
        required: false

env:
  CODE_COVERAGE_SUMMARY_DIR: ${{ vars.CODE_COVERAGE_SUMMARY_DIR || '_codeCoverage' }}
  CODE_COVERAGE_SUMMARY_FILE: ${{ vars.CODE_COVERAGE_SUMMARY_FILE || 'SummaryGithub.md' }}

jobs:
  compile:
    name: Compile & Analyse
    runs-on: ${{ inputs.compilePhaseRunnerOs }}
    outputs:
      semver: ${{ steps.run_compile.outputs.semver }}
      major: ${{ steps.run_compile.outputs.major }}
      majorMinor: ${{ steps.run_compile.outputs.majorMinor }}
      preReleaseTag: ${{ steps.run_compile.outputs.preReleaseTag }}

    steps:
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/common-pre-scripted-build@feature/194-post-compile-parallel-job
      with:
        azureCredentials: ${{ secrets.compilePhaseAzureCredentials }}
        additionalEnvVars: ${{ inputs.compilePhaseEnv}}
        additionalSecrets: ${{ secrets.compilePhaseSecrets}}
        secretsEncryptionKey: ${{ secrets.secretsEncryptionKey }}
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/run-scripted-build@main
      id: run_compile
      with:
        displayName: Compile & Analyse
        buildScriptPath: ${{ inputs.buildScriptPath }}
        netSdkVersion: ${{ inputs.netSdkVersion }}
        additionalNetSdkVersion: ${{ inputs.additionalNetSdkVersion }}
        pythonVersion: ${{ inputs.pythonVersion }}
        tasks: ${{ inputs.compilePhaseTasks }}
        configuration: ${{ inputs.configuration }}
        outputCacheKeySuffix: compile
        outputCachePaths: |
          .nuget-packages
          Solutions
          solutions
          ${{ inputs.additionalCachePaths }}
        enableCrossOsCaching: ${{ inputs.enableCrossOsCaching}}
      env:
        # TODO: Add equivalent env var overrides for use with ZeroFailed
        BUILDVAR_AnalysisOutputStorageAccountName: ${{ vars.SBOM_OUTPUT_STORAGE_ACCOUNT_NAME}}
        BUILDVAR_AnalysisOutputContainerName: ${{ vars.SBOM_OUTPUT_STORAGE_CONTAINER_NAME}}
        BUILDVAR_AnalysisOutputBlobPath: ${{ vars.SBOM_OUTPUT_STORAGE_BLOB_BASE_PATH }}/src_platform=github/org=${{ github.repository_owner }}/repo=${{ github.event.repository.name }}
        BUILDVAR_PublishCovenantOutputToStorage: true
        BUILDVAR_CovenantMetadata: >
          {
            "git_provider": "github",
            "git_org": "${{ github.repository_owner }}",
            "git_repo": "${{ github.event.repository.name }}",
            "git_branch": "${{ github.ref_name }}", 
            "git_sha": "${{ github.sha }}"
          }

  test:
    needs:
    - compile
    name: Test
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(inputs.testPhaseMatrixJson) }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/common-pre-scripted-build@feature/194-post-compile-parallel-job
      with:
        azureCredentials: ${{ secrets.testPhaseAzureCredentials }}
        additionalEnvVars: ${{ inputs.testPhaseEnv}}
        additionalSecrets: ${{ secrets.testPhaseSecrets}}
        secretsEncryptionKey: ${{ secrets.secretsEncryptionKey }}
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/run-scripted-build@main
      with:
        displayName: Run Tests
        buildScriptPath: ${{ inputs.buildScriptPath }}
        netSdkVersion: ${{ inputs.netSdkVersion }}
        additionalNetSdkVersion: ${{ inputs.additionalNetSdkVersion }}
        tasks: ${{ inputs.testPhaseTasks }}
        configuration: ${{ inputs.configuration }}
        inputCacheKeySuffix: compile
        inputCachePaths: |
          .nuget-packages
          Solutions
          solutions
          ${{ inputs.additionalCachePaths }}
        enableCrossOsCaching: ${{ inputs.enableCrossOsCaching}}
        artifactName: ${{ inputs.testArtifactName }}
        artifactPath: ${{ inputs.testArtifactPath }}
      env:
        # TODO: Add equivalent env var overrides for use with ZeroFailed
        # Set build to produce .trx test results file which will be picked-up when publishing test results
        BUILDVAR_DotNetTestLoggers: >
          [
            "trx;LogFilePrefix=test-results_"
          ]
        BUILDVAR_TargetFrameworkMoniker: ${{ matrix.dotnetFramework }}
    - id: check_coverage_summary
      name: Check Code Coverage Summary Output
      if: always()
      run: |
        # check if the code coverage summary file exists, but ensure the build doesn't fail if it can't be found
        try {
          $coverageFile = Join-Path $env:CODE_COVERAGE_SUMMARY_DIR $env:CODE_COVERAGE_SUMMARY_FILE
          Write-Host "Checking for code coverage file: $coverageFile"
          if (Test-Path $coverageFile) {
            Write-Host "Code coverage summary file exists"
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          }
        }
        catch {}
      shell: pwsh
    - id: check_os
      name: Check Runner OS
      if: always()
      run: |
        # store the runner's operating system (i.e. distinct from the OS version info available via runner image)
        if ($IsWindows) {
          $RunnerOs = "windows"
        } 
        elseif ($IsLinux) {
            $RunnerOs = "linux"
        }
        elseif ($IsMacOS) {
            $RunnerOs = "macos"
        }
        else {
            $RunnerOs = "Unknown"
        }
        Write-Host "Runner OS: $RunnerOs"
        echo "RUNNEROS=$RunnerOs" >> $env:GITHUB_OUTPUT
      shell: pwsh
    - name: Add Code Coverage PR comment
      # Builds run from forks will not have permission to annotate the PR
      if: |
        always() &&
        steps.check_coverage_summary.outputs.EXISTS == 'true' &&
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff    # v3.0.3
      with:
        recreate: true
        path: ${{ env.CODE_COVERAGE_SUMMARY_DIR }}/${{ env.CODE_COVERAGE_SUMMARY_FILE }}
        header: ${{ matrix.os }}-${{ matrix.dotnetFramework }}
    # Conditional test result publishing as we can't use the docker version of the action on Windows
    - name: Publish Test Results (Linux)
      uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040   # v2.23.0
      if: always() && steps.check_os.outputs.RUNNEROS == 'linux'
      with:
        # Look for test results produced by Pester, VSTest/MTP & PyTest/Behave
        files: |
          TestResults.xml
          **/test-results*.trx
          **/*-test-results.xml
    - name: Publish Test Results (Windows)
      uses: EnricoMi/publish-unit-test-result-action/windows@c950f6fb443cb5af20a377fd0dfaa78838901040   # v2.23.0
      if: always() && steps.check_os.outputs.RUNNEROS == 'windows'
      with:
        # Look for test results produced by Pester, VSTest/MTP & PyTest/Behave
        files: |
          TestResults.xml
          **/test-results*.trx
          **/*-test-results.xml

  package:
    needs:
    - compile
    name: Package
    runs-on: ${{ inputs.packagePhaseRunnerOs }}
    steps:
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/common-pre-scripted-build@feature/194-post-compile-parallel-job
      with:
        azureCredentials: ${{ secrets.packagePhaseAzureCredentials }}
        additionalEnvVars: ${{ inputs.packagePhaseEnv}}
        additionalSecrets: ${{ secrets.packagePhaseSecrets}}
        secretsEncryptionKey: ${{ secrets.secretsEncryptionKey }}
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/run-scripted-build@main
      with:
        displayName: Build Packages
        buildScriptPath: ${{ inputs.buildScriptPath }}
        netSdkVersion: ${{ inputs.netSdkVersion }}
        additionalNetSdkVersion: ${{ inputs.additionalNetSdkVersion }}
        tasks: ${{ inputs.packagePhaseTasks }}
        configuration: ${{ inputs.configuration }}
        inputCacheKeySuffix: compile
        inputCachePaths: |
          .nuget-packages
          Solutions
          solutions
          ${{ inputs.additionalCachePaths }}
        enableCrossOsCaching: ${{ inputs.enableCrossOsCaching}}
        outputCacheKeySuffix: package
        outputCachePaths: |
          _packages
          ${{ inputs.additionalCachePaths }}

  postCompile:
    needs:
    - compile
    name: Post-Compile
    if: inputs.postCompilePhaseTasks != ''
    runs-on: ${{ inputs.postCompileRunnerOs }}
    steps:
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/common-pre-scripted-build@feature/194-post-compile-parallel-job
      with:
        azureCredentials: ${{ secrets.postCompilePhaseAzureCredentials }}
        additionalEnvVars: ${{ inputs.postCompilePhaseEnv}}
        additionalSecrets: ${{ secrets.postCompilePhaseSecrets }}
        secretsEncryptionKey: ${{ secrets.secretsEncryptionKey }}
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/run-scripted-build@main
      id: run_post_compile
      with:
        displayName: Post-Compile
        buildScriptPath: ${{ inputs.buildScriptPath }}
        netSdkVersion: ${{ inputs.netSdkVersion }}
        additionalNetSdkVersion: ${{ inputs.additionalNetSdkVersion }}
        pythonVersion: ${{ inputs.pythonVersion }}
        tasks: ${{ inputs.postCompilePhaseTasks }}
        configuration: ${{ inputs.configuration }}
        inputCacheKeySuffix: compile
        outputCacheKeySuffix: postcompile
        outputCachePaths: |
          .nuget-packages
          Solutions
          solutions
          ${{ inputs.additionalCachePaths }}
        enableCrossOsCaching: ${{ inputs.enableCrossOsCaching}}
    - name: Upload artifact
      if: inputs.postCompileArtifactName != '' && inputs.postCompileArtifactPath != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a    # v7.0.1
      with:
        name: ${{ inputs.postCompileArtifactName }}
        path: ${{ inputs.postCompileArtifactPath }}
        include-hidden-files: true

  publish:
    needs:
    - compile
    - test
    - package
    - postCompile
    name: Publish
    if: inputs.forcePublish || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/common-pre-scripted-build@feature/194-post-compile-parallel-job
      with:
        azureCredentials: ${{ secrets.publishPhaseAzureCredentials }}
        additionalEnvVars: ${{ inputs.publishPhaseEnv}}
        additionalSecrets: ${{ secrets.publishPhaseSecrets}}
        secretsEncryptionKey: ${{ secrets.secretsEncryptionKey }}  
    - uses: endjin/Endjin.RecommendedPractices.GitHubActions/actions/run-scripted-build@main
      with:
        displayName: Publish Packages
        buildScriptPath: ${{ inputs.buildScriptPath }}
        netSdkVersion: ${{ inputs.netSdkVersion }}
        additionalNetSdkVersion: ${{ inputs.additionalNetSdkVersion }}
        tasks: ${{ inputs.publishPhaseTasks }}
        inputCacheKeySuffix: package
        inputCachePaths: |
          _packages
          ${{ inputs.additionalCachePaths }}
        enableCrossOsCaching: ${{ inputs.enableCrossOsCaching}}
        artifactName: ${{ inputs.publishArtifactName }}
        artifactPath: ${{ inputs.publishArtifactPath }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ env.NUGET_API_KEY }}
